<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פרמפרמט — Reverse Prompt Engineering</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #08080e;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(0,255,136,0.15);
      --green: #00ff88;
      --blue: #7b8cff;
      --text: #ddd8ce;
      --muted: #666;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -30vh;
      right: -20vw;
      width: 70vw;
      height: 70vh;
      background: radial-gradient(ellipse, rgba(0,255,136,0.05) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 64px 24px 100px;
    }

    /* Header */
    .eyebrow {
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 18px;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-family: var(--font-display);
      font-size: clamp(52px, 10vw, 88px);
      font-style: italic;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -3px;
      margin-bottom: 20px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      max-width: 460px;
      margin-bottom: 52px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    /* Input row */
    .input-row {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: rgba(0,255,136,0.018);
      margin-bottom: 36px;
      animation: fadeUp 0.6s 0.3s ease both;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: rgba(0,255,136,0.4);
    }

    #urlInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      padding: 17px 22px;
      font-size: 14px;
      color: var(--text);
      font-family: var(--font-mono);
      direction: ltr;
      text-align: left;
    }

    #urlInput::placeholder { color: #444; }

    #analyzeBtn {
      background: var(--green);
      color: #08080e;
      border: none;
      padding: 17px 30px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      font-family: var(--font-mono);
      transition: opacity 0.2s, background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #analyzeBtn:hover:not(:disabled) { opacity: 0.85; }
    #analyzeBtn:disabled {
      background: transparent;
      color: var(--green);
      border-right: 1px solid var(--border);
      cursor: default;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,255,136,0.2);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-left: 8px;
    }

    /* Loading state */
    #loading {
      display: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px;
      text-align: center;
      margin-bottom: 24px;
    }

    #loading .loading-text {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 2px;
      margin-top: 16px;
    }

    /* Error */
    #error {
      display: none;
      border: 1px solid rgba(255,80,60,0.3);
      background: rgba(255,80,60,0.04);
      border-radius: 4px;
      padding: 20px 24px;
      color: #ff5040;
      font-size: 13px;
      margin-bottom: 24px;
    }

    /* Results */
    #results { display: none; }

    .card {
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
      animation: fadeUp 0.5s ease both;
    }

    .card-product {
      border: 1px solid rgba(0,255,136,0.18);
      background: rgba(0,255,136,0.025);
      padding: 26px 28px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      flex-wrap: wrap;
    }

    .label-small {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .product-name {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 700;
    }

    .confidence-badge {
      font-size: 10px;
      letter-spacing: 2px;
      padding: 6px 14px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .conf-high  { color: #00ff88; border: 1px solid rgba(0,255,136,0.3); }
    .conf-medium{ color: #ffcc00; border: 1px solid rgba(255,204,0,0.3); }
    .conf-low   { color: #ff6644; border: 1px solid rgba(255,102,68,0.3); }

    .product-summary {
      margin-top: 16px;
      color: #999;
      line-height: 1.75;
      font-size: 13px;
    }

    .stack-guess {
      margin-top: 12px;
      font-size: 11px;
      color: #444;
    }

    /* Prompt cards */
    .prompt-card {
      border: 1px solid rgba(123,140,255,0.18);
    }

    .prompt-card.master {
      border-color: rgba(0,255,136,0.2);
    }

    .prompt-card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      gap: 12px;
    }

    .prompt-card.master .prompt-card-head {
      background: rgba(0,255,136,0.04);
    }

    .prompt-card:not(.master) .prompt-card-head {
      background: rgba(123,140,255,0.04);
    }

    .prompt-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .prompt-card.master .prompt-label { color: var(--green); }
    .prompt-card:not(.master) .prompt-label { color: var(--blue); }

    .prompt-sublabel {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #666;
      padding: 5px 14px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      letter-spacing: 2px;
      font-family: var(--font-mono);
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .copy-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .copy-btn.copied { color: var(--green); border-color: rgba(0,255,136,0.3); }

    .prompt-body {
      padding: 20px 22px;
      font-size: 13px;
      line-height: 1.85;
      color: #bbb;
      white-space: pre-wrap;
    }

    /* Copy all btn */
    #copyAll {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      padding: 15px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-family: var(--font-mono);
      transition: all 0.2s;
      margin-top: 4px;
    }
    #copyAll:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

    /* Note */
    .api-note {
      margin-top: 48px;
      padding: 18px 22px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      font-size: 11px;
      color: #444;
      line-height: 1.7;
    }
    .api-note a { color: #666; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="eyebrow">◈ reverse prompt engineering</div>
  <h1>פרמפרמט אותה</h1>
  <p class="subtitle">הדבק URL של מוצר AI — נשחזר את הפרומפטים שבנו אותו</p>

  <!-- Row 1: URL input (always visible) -->
  <div class="input-row">
    <input id="urlInput" type="url" placeholder="https://v0.dev  /  https://perplexity.ai  /  כל מוצר אחר" />
    <button id="analyzeBtn" onclick="analyze()">פרמפרמט ◈</button>
  </div>

  <!-- Row 2: API key (entry or indicator) -->
  <div id="keySection" style="margin-bottom:36px;">
    <div style="display:flex; gap:0; border:1px solid rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; background:rgba(255,255,255,0.01);">
      <input id="keyInput" type="password" placeholder="Anthropic API key  —  sk-ant-..." dir="ltr"
        style="flex:1;background:transparent;border:none;outline:none;padding:13px 18px;font-size:13px;color:#888;font-family:var(--font-mono);"
        onkeydown="if(event.key==='Enter') submitKey()" />
      <button onclick="submitKey()"
        style="background:transparent;color:#555;border:none;border-right:1px solid rgba(255,255,255,0.08);padding:13px 20px;font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--font-mono);white-space:nowrap;transition:color 0.15s;"
        onmouseover="this.style.color='#aaa'" onmouseout="this.style.color='#555'">
        שמור
      </button>
      <a href="https://console.anthropic.com" target="_blank"
        style="display:flex;align-items:center;padding:13px 16px;font-size:10px;color:#444;text-decoration:none;letter-spacing:1px;white-space:nowrap;transition:color 0.15s;"
        onmouseover="this.style.color='#888'" onmouseout="this.style.color='#444'">
        console.anthropic.com ↗
      </a>
    </div>
    <div id="keyError" style="display:none;margin-top:8px;font-size:11px;color:#ff5040;padding-right:4px;"></div>
  </div>

  <!-- Key indicator (shown after key saved) -->
  <div id="keyIndicator" style="display:none; margin-bottom:36px; align-items:center; justify-content:space-between; padding:12px 18px; border:1px solid rgba(255,255,255,0.06); border-radius:4px; font-size:11px; color:#555; letter-spacing:1px;">
    <span>◦ API key פעיל</span>
    <button onclick="clearKey()" style="background:transparent;border:none;color:#555;cursor:pointer;font-family:var(--font-mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:0;transition:color 0.15s;" onmouseover="this.style.color='#aaa'" onmouseout="this.style.color='#555'">החלף ×</button>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">מחפש מידע · מנתח · מפרמפרמט...</div>
  </div>

  <!-- Error -->
  <div id="error"></div>

  <!-- Results -->
  <div id="results"></div>

</div>

<script>
// ── API Key management ──────────────────────────────────────
function getKey() { return sessionStorage.getItem("prampramt_key") || ""; }

function saveKey(k) {
  sessionStorage.setItem("prampramt_key", k);
  updateKeyUI();
}

function clearKey() {
  sessionStorage.removeItem("prampramt_key");
  updateKeyUI();
}

function updateKeyUI() {
  const hasKey = !!getKey();
  document.getElementById("keyIndicator").style.display = hasKey ? "flex" : "none";
  document.getElementById("keySection").style.display   = hasKey ? "none"  : "block";
}

function submitKey() {
  const val = document.getElementById("keyInput").value.trim();
  if (!val.startsWith("sk-")) {
    const err = document.getElementById("keyError");
    err.textContent = "Key לא תקין — חייב להתחיל ב-sk-";
    err.style.display = "block";
    return;
  }
  saveKey(val);
}

// Run on load
window.addEventListener("DOMContentLoaded", updateKeyUI);

const SYSTEM_PROMPT = `אתה "פרמפרמט" — מומחה בהנדסה לאחור של פרומפטים מתוך מוצרי AI.

המשתמש יתן לך URL של מוצר או שירות. המשימה שלך:
1. חפש מידע על המוצר דרך web search
2. נתח: מה הוא עושה, מה הטון, מה הפיצ'רים, מה הקהל, מה הארכיטקטורה
3. הסק מה הפרומפטים שיצרו אותו

החזר JSON בלבד (ללא markdown, ללא backticks):

{
  "product_name": "שם המוצר",
  "product_summary": "תיאור קצר (2-3 משפטים)",
  "confidence": "high" | "medium" | "low",
  "master_prompt": "הפרומפט הגדול הכללי — זהות, מטרה, טון, התנהגות. כתוב אותו כפרומפט אמיתי.",
  "component_prompts": [
    { "component": "שם רכיב", "prompt": "הפרומפט הספציפי לרכיב זה" }
  ],
  "stack_guess": "השערת סטאק/טכנולוגיה"
}

היה ספציפי. כתוב פרומפטים אמיתיים שמישהו יכול להשתמש בהם — לא תיאורים.`;

let lastResult = null;

async function analyze() {
  const url = document.getElementById("urlInput").value.trim();
  if (!url) return;

  const btn = document.getElementById("analyzeBtn");
  const loading = document.getElementById("loading");
  const error = document.getElementById("error");
  const results = document.getElementById("results");

  btn.disabled = true;
  btn.innerHTML = 'סורק <span class="spinner"></span>';
  loading.style.display = "block";
  error.style.display = "none";
  results.style.display = "none";
  results.innerHTML = "";

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": getKey(),
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1500,
        system: SYSTEM_PROMPT,
        tools: [{ type: "web_search_20250305", name: "web_search" }],
        messages: [{ role: "user", content: `נתח את המוצר בכתובת: ${url}` }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `שגיאת API: ${response.status}`);
    }

    const data = await response.json();
    const textBlock = data.content?.find(b => b.type === "text");
    if (!textBlock) throw new Error("לא התקבלה תגובה מהמודל");

    const jsonMatch = textBlock.text.replace(/```json|```/g, "").match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error("לא הצלחתי לנתח את התגובה");

    lastResult = JSON.parse(jsonMatch[0]);
    renderResults(lastResult);

  } catch (e) {
    error.textContent = "✗ " + (e.message || "שגיאה לא ידועה");
    error.style.display = "block";
  } finally {
    btn.disabled = false;
    btn.textContent = "פרמפרמט ◈";
    loading.style.display = "none";
  }
}

function renderResults(r) {
  const confMap = {
    high:   { text: "ביטחון גבוה",   cls: "conf-high" },
    medium: { text: "ביטחון בינוני", cls: "conf-medium" },
    low:    { text: "ביטחון נמוך",   cls: "conf-low" }
  };
  const conf = confMap[r.confidence] || confMap.medium;

  let html = `
    <!-- Product card -->
    <div class="card card-product">
      <div class="card-header">
        <div>
          <div class="label-small">◈ מוצר מזוהה</div>
          <div class="product-name">${esc(r.product_name)}</div>
        </div>
        <span class="confidence-badge ${conf.cls}">${conf.text}</span>
      </div>
      <p class="product-summary">${esc(r.product_summary)}</p>
      ${r.stack_guess ? `<div class="stack-guess">◦ ${esc(r.stack_guess)}</div>` : ""}
    </div>

    <!-- Master prompt -->
    <div class="card prompt-card master">
      <div class="prompt-card-head">
        <div>
          <div class="prompt-label">הפרומפט המאסטר</div>
          <div class="prompt-sublabel">הפרומפט הגדול שמגדיר את כל המוצר</div>
        </div>
        <button class="copy-btn" onclick="copyPrompt(this, 'master')">העתק</button>
      </div>
      <div class="prompt-body" id="master">${esc(r.master_prompt)}</div>
    </div>
  `;

  (r.component_prompts || []).forEach((cp, i) => {
    html += `
      <div class="card prompt-card">
        <div class="prompt-card-head">
          <div>
            <div class="prompt-label">${esc(cp.component)}</div>
            <div class="prompt-sublabel">פרומפט רכיב</div>
          </div>
          <button class="copy-btn" onclick="copyPrompt(this, 'comp${i}')">העתק</button>
        </div>
        <div class="prompt-body" id="comp${i}">${esc(cp.prompt)}</div>
      </div>
    `;
  });

  html += `<button id="copyAll" onclick="copyAll()">העתק הכל →</button>`;

  const results = document.getElementById("results");
  results.innerHTML = html;
  results.style.display = "block";
  results.scrollIntoView({ behavior: "smooth", block: "start" });
}

function copyPrompt(btn, id) {
  const text = document.getElementById(id)?.textContent || "";
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓ הועתק";
    btn.classList.add("copied");
    setTimeout(() => { btn.textContent = "העתק"; btn.classList.remove("copied"); }, 2000);
  });
}

function copyAll() {
  if (!lastResult) return;
  const r = lastResult;
  let text = `# ${r.product_name}\n\n## פרומפט מאסטר\n${r.master_prompt}\n\n`;
  (r.component_prompts || []).forEach(c => { text += `## ${c.component}\n${c.prompt}\n\n`; });
  navigator.clipboard.writeText(text.trim()).then(() => {
    const btn = document.getElementById("copyAll");
    btn.textContent = "✓ הועתק!";
    setTimeout(() => btn.textContent = "העתק הכל →", 2000);
  });
}

function esc(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

document.addEventListener("keydown", e => {
  const urlInput = document.getElementById("urlInput");
  if (e.key === "Enter" && document.activeElement === urlInput) analyze();
});
</script>
</body>
</html>
